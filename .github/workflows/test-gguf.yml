# Smoke-test workflow (NOT generated by conda-smithy).
# Builds the conda package from the recipe, installs it into a fresh env,
# downloads a small GGUF model and runs test_gguf.py end-to-end.
# The job fails if test_gguf.py exits with a non-zero status.
name: Test GGUF inference

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: test-gguf-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  test-gguf:
    name: Build package and run test_gguf.py
    runs-on: ubuntu-latest
    timeout-minutes: 120
    defaults:
      run:
        # login shell so `conda activate` / `conda run` work
        shell: bash -el {0}
    env:
      PYTHON_VERSION: "3.12"
      # Tiny GGUF model used only to smoke-test load/tokenize/inference.
      # Override here to test against a different/larger model.
      MODEL_URL: "https://huggingface.co/ggml-org/models/resolve/main/tinyllamas/stories260K.gguf"

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Miniforge (conda-forge only)
        uses: conda-incubator/setup-miniconda@835234971496cad1653abb28a638a281cf32541f # v3.2.0
        with:
          miniforge-version: latest
          channels: conda-forge
          conda-remove-defaults: "true"

      - name: Install conda-build
        run: conda install -n base -y conda-build

      - name: Build conda package
        run: |
          conda build recipe \
            -m ".ci_support/linux_64_python${PYTHON_VERSION}.____cpython.yaml" \
            --no-anaconda-upload \
            --output-folder ./build_output

      - name: Create test environment from local build
        run: |
          conda create -n gguftest -y \
            -c ./build_output \
            -c conda-forge \
            "python=${PYTHON_VERSION}" llama-cpp-python

      - name: Verify package import and pip consistency
        run: |
          conda run -n gguftest python -c "import llama_cpp; print('llama_cpp', llama_cpp.__version__)"
          conda run -n gguftest pip check

      - name: Download test GGUF model
        run: |
          mkdir -p models
          curl -fL --retry 3 -o models/test.gguf "$MODEL_URL"
          ls -lh models/test.gguf

      - name: Run test_gguf.py
        run: |
          conda run -n gguftest python test_gguf.py models/test.gguf
